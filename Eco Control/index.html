<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco Control | Monitoramento Elétrico</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link rel="icon" href="img/eletrologoicontop.png" type="image/x-icon">   

    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
    <script src="script.js"></script>

    <link rel="stylesheet" href="style.css">

    
</head>
<body class="dark-theme">
    <div class="background-gradients"></div>
    
    <main class="dashboard-wrapper">
        <header class="main-header glass-element fade-in">
            <div class="logo-area">
                <span class="material-icons-outlined logo-icon">electric_bolt</span>
                <h1>ECO<span class="highlight">CONTROL</span> UNIFEOB</h1>
            </div>
            <div class="header-actions">
                <div class="status-indicator">
                    <span class="pulse green"></span> ONLINE
                </div>
                <button id="fullscreen-btn" class="icon-btn" title="Tela Cheia">
                    <span class="material-icons-outlined">fullscreen</span>
                </button>
            </div>
        </header>

        <section class="metrics-grid">
            <div class="card glass-element main-gauge slide-up delay-1">
                <div class="card-header">
                    <h3>Potência Atual (kW)</h3>
                    <span class="material-icons-outlined info-icon" title="Consumo instantâneo total">info</span>
                </div>
                <div class="gauge-display">
                    <canvas id="mainGaugeCanvas"></canvas>
                    <div class="gauge-digits">
                        <span id="power-value">--.-</span>
                    </div>
                </div>
            </div>

            <div class="mini-cards-layout">
                <div class="card glass-element mini-card slide-up delay-2">
                    <span class="material-icons-outlined card-icon blue">power</span>
                    <p>Voltagem</p>
                    <h2 id="volt-value">--.-<span>V</span></h2>
                </div>
                <div class="card glass-element mini-card slide-up delay-2">
                    <span class="material-icons-outlined card-icon green">electric_meter</span>
                    <p>Corrente</p>
                    <h2 id="amp-value">--.-<span>A</span></h2>
                </div>
                <div class="card glass-element mini-card slide-up delay-3 highlight-blue">
                    <span class="material-icons-outlined card-icon">payments</span>
                    <p>Gasto no Mês (Est.)</p>
                    <h2>R$ 142,50</h2>
                </div>
                <div class="card glass-element mini-card slide-up delay-3 highlight-green">
                    <span class="material-icons-outlined card-icon">track_changes</span>
                    <p>Eficiência da Meta</p>
                    <h2>82%</h2>
                </div>
            </div>
        </section>

        <section class="visuals-container">
            <div class="card glass-element chart-card slide-up delay-4">
                <div class="card-header">
                    <h3>Padrão de Consumo (24h)</h3>
                    <div class="chart-filters">
                        <button class="filter-btn active">Dia</button>
                        <button class="filter-btn">Semana</button>
                        <button class="filter-btn">Mês</button>
                    </div>
                </div>
                <div class="chart-wrapper">
                    <canvas id="consumptionLineChart"></canvas>
                </div>
            </div>
        </section>
    </main>

    <button class="ai-assistant-btn glass
